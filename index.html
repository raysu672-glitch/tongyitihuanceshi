<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同义替换测试版</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --purple: #8b5cf6;
    --green: #22d3a7;
    --red: #f43f5e;
    --text: #e2e8f0;
    --dim: #94a3b8;
  }
  body {
    font-family: "Segoe UI", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 700px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 1.5rem; color: var(--purple); }
  .header p { color: var(--dim); font-size: 0.9rem; margin-top: 4px; }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-num { font-size: 2rem; font-weight: 700; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.purple { color: var(--purple); }
  .stat-lbl { font-size: 0.8rem; color: var(--dim); margin-top: 4px; }
  .hint {
    background: var(--card);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
    color: var(--dim);
    margin-bottom: 16px;
    font-size: 0.95rem;
  }
  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .word {
    padding: 10px 18px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.95rem;
  }
  .word:hover:not(.used) {
    border-color: var(--purple);
    box-shadow: 0 0 15px rgba(139,92,246,0.3);
    transform: translateY(-2px);
  }
  .word.anchor {
    background: linear-gradient(135deg, var(--purple), #6d28d9);
    color: #fff;
    border-color: var(--purple);
    transform: scale(1.05);
  }
  .word.correct {
    background: linear-gradient(135deg, var(--green), #059669);
    color: #fff;
    border-color: var(--green);
  }
  .word.wrong {
    background: linear-gradient(135deg, var(--red), #dc2626);
    color: #fff;
    border-color: var(--red);
    animation: shake 0.4s;
  }
  .word.used { opacity: 0.3; cursor: default; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .chain {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .chain.show { display: block; }
  .chain-label { font-size: 0.8rem; color: var(--dim); margin-bottom: 8px; }
  .chain-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .chain-tag {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 0.9rem;
  }
  .chain-tag.anchor { background: var(--purple); color: #fff; }
  .chain-tag.found { background: var(--green); color: #fff; }
  .feedback {
    background: var(--card);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    margin-bottom: 16px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { color: var(--green); }
  .feedback.err { color: var(--red); }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
    display: none;
  }
  .actions.show { display: flex; }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--purple);
    color: #fff;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--dim);
  }
  .btn:hover { transform: translateY(-2px); }
  /* 结果页面 */
  .result {
    background: var(--card);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    display: none;
  }
  .result.show { display: block; }
  .result-title { font-size: 1rem; color: var(--dim); margin-bottom: 8px; }
  .result-score {
    font-size: 4rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--purple), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-detail { color: var(--dim); margin: 16px 0; line-height: 1.6; }
  .missed-section { margin-top: 24px; text-align: left; }
  .missed-title { font-size: 0.9rem; color: var(--red); margin-bottom: 12px; font-weight: 600; }
  .missed-words { display: flex; flex-wrap: wrap; gap: 8px; }
  .missed-word {
    padding: 6px 14px;
    background: rgba(244,63,94,0.15);
    border: 1px solid var(--red);
    border-radius: 20px;
    font-size: 0.85rem;
    color: #fff;
  }
  .missed-group {
    margin-bottom: 16px;
    padding: 12px;
    background: rgba(244,63,94,0.05);
    border-radius: 10px;
  }
  .missed-group-label { font-size: 0.75rem; color: var(--dim); margin-bottom: 6px; }
  .restart-btn {
    margin-top: 24px;
    padding: 12px 32px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .restart-btn:hover { transform: translateY(-2px); }
  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .word { font-size: 0.85rem; padding: 8px 14px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>同义替换测试</h1>
    <p>随机10组，不显示答案，测试你的同义替换能力</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num purple" id="foundCount">0</div>
      <div class="stat-lbl">已找到</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="totalCount">—</div>
      <div class="stat-lbl">总词数</div>
    </div>
    <div class="stat">
      <div class="stat-num red" id="wrongCount">0</div>
      <div class="stat-lbl">错误次数</div>
    </div>
  </div>

  <div class="hint" id="hint">点击任意单词开始练习</div>

  <div class="grid" id="wordGrid"></div>

  <div class="chain" id="chainBox">
    <div class="chain-label">当前同义链</div>
    <div class="chain-tags" id="chainTags"></div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="actions" id="actions">
    <button class="btn btn-outline" onclick="skipGroup()">跳过这组</button>
    <button class="btn btn-primary" onclick="nextGroup()">下一组</button>
  </div>

  <div class="result" id="result">
    <div class="result-title">测试完成</div>
    <div class="result-score" id="resultScore">0%</div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="missed-section" id="missedSection">
      <div class="missed-title">未找到的词</div>
      <div id="missedGroups"></div>
    </div>
    <button class="restart-btn" onclick="restart()">再来一轮</button>
  </div>
</div>

  ["vicinity", "nearby", "neighborhood"],
  ["imperative", "pressing", "crucial", "critical", "urgent", "vital", "things that are obligated"],
  ["proliferate", "multiply", "increase", "breed", "reproduce", "spread", "propagate"],
  ["chastise", "speak angrily", "reprimand", "rebuke", "berate"],
  ["homogeneous", "similar", "uniform", "consistent", "identical"],
];

// 游戏状态
let activeGroups = [], allWords = [], wordToGroup = {};
let anchorIdx = null, currentChain = [], usedWords = new Set();
let foundCount = 0, wrongCount = 0;
let totalWordCount = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function start() {
  foundCount = 0; wrongCount = 0;
  anchorIdx = null; currentChain = []; usedWords = new Set();

  // 随机选10组
  const indices = shuffle([...Array(ALL_GROUPS.length).keys()]).slice(0, 10);
  activeGroups = indices.map(i => ALL_GROUPS[i]);

  // 构建词表
  allWords = [];
  wordToGroup = {};
  activeGroups.forEach((grp, gi) => {
    grp.forEach(w => {
      allWords.push(w);
      wordToGroup[w] = gi;
    });
  });
  allWords = shuffle(allWords);
  totalWordCount = allWords.length;

  document.getElementById('result').classList.remove('show');
  document.querySelector('.stats').closest('.container').querySelector('.stats').style.display = '';
  document.getElementById('hint').style.display = '';
  document.getElementById('hint').textContent = '点击任意单词开始练习';
  document.getElementById('chainBox').classList.remove('show');
  document.getElementById('actions').classList.remove('show');
  hideFeedback();

  document.getElementById('totalCount').textContent = totalWordCount;
  updateStats();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('wordGrid');
  grid.innerHTML = '';
  allWords.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'word' + (usedWords.has(w) ? ' used' : '');
    btn.id = 'w_' + CSS.escape(w);
    btn.textContent = w;
    if (!usedWords.has(w)) {
      btn.addEventListener('click', () => handleClick(w));
    }
    grid.appendChild(btn);
  });
}

function getBtn(w) {
  return document.getElementById('w_' + CSS.escape(w));
}

function handleClick(word) {
  if (usedWords.has(word)) return;
  const gi = wordToGroup[word];

  if (anchorIdx === null) {
    // 选择参照词
    anchorIdx = gi;
    currentChain = [word];
    getBtn(word).classList.add('anchor');
    getBtn(word).disabled = true;
    document.getElementById('chainBox').classList.add('show');
    document.getElementById('actions').classList.add('show');
    document.getElementById('hint').textContent = `参照词已选定，继续找出同义词`;
    renderChain();
  } else if (gi === anchorIdx) {
    // 正确
    foundCount++;
    currentChain.push(word);
    usedWords.add(word);
    const btn = getBtn(word);
    btn.classList.add('correct');
    btn.classList.add('used');
    btn.disabled = true;
    renderChain();
    updateStats();

    const remaining = activeGroups[anchorIdx].filter(w => !usedWords.has(w));
    if (remaining.length === 0) {
      showFeedback('这组完成', 'ok');
    } else {
      showFeedback(`还有 ${remaining.length} 个`, 'ok');
    }
  } else {
    // 错误（无提示）
    wrongCount++;
    const btn = getBtn(word);
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 400);
    updateStats();
    showFeedback('不属于这组', 'err');
  }
}

function renderChain() {
  const tags = document.getElementById('chainTags');
  tags.innerHTML = '';
  currentChain.forEach((w, i) => {
    const span = document.createElement('span');
    span.className = 'chain-tag ' + (i === 0 ? 'anchor' : 'found');
    span.textContent = w;
    tags.appendChild(span);
  });
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.className = 'feedback show ' + type;
  el.textContent = msg;
}

function hideFeedback() {
  document.getElementById('feedback').className = 'feedback';
}

function updateStats() {
  document.getElementById('foundCount').textContent = foundCount;
  document.getElementById('wrongCount').textContent = wrongCount;
}

function nextGroup() {
  finishGroup();
}

function skipGroup() {
  finishGroup();
}

function finishGroup() {
  if (anchorIdx === null) return;
  const grp = activeGroups[anchorIdx];
  grp.forEach(w => usedWords.add(w));
  anchorIdx = null;
  currentChain = [];
  document.getElementById('chainBox').classList.remove('show');
  document.getElementById('actions').classList.remove('show');
  hideFeedback();
  renderGrid();

  const remaining = allWords.filter(w => !usedWords.has(w));
  if (remaining.length === 0) {
    showResult();
  } else {
    document.getElementById('hint').textContent = '选择下一个单词开始';
  }
}

function showResult() {
  // 收集所有组中未找到的词
  const missedGroups = [];
  let totalMissed = 0;

  activeGroups.forEach((grp, gi) => {
    const missed = grp.filter(w => !currentChain.includes(w) && usedWords.has(w) === false);
    // 重新计算：这组被跳过时用另一种方式
    const found = grp.filter(w => !usedWords.has(w) === false && grp.indexOf(w) > -1);
  });

  // 重新遍历找未找到的词
  const allFoundWords = new Set();
  let tempAnchorIdx = null;
  // 简单计算：已找到的词
  allWords.forEach(w => {
    if (usedWords.has(w)) allFoundWords.add(w);
  });

  activeGroups.forEach((grp, gi) => {
    const missed = grp.filter(w => !allFoundWords.has(w));
    if (missed.length > 0) {
      missedGroups.push({ groupIndex: gi + 1, words: missed });
      totalMissed += missed.length;
    }
  });

  const percentage = Math.round((foundCount / totalWordCount) * 100);

  document.getElementById('resultScore').textContent = percentage + '%';
  document.getElementById('resultDetail').innerHTML =
    `找到 <strong>${foundCount}</strong> / <strong>${totalWordCount}</strong> 个词<br>错误次数：<strong>${wrongCount}</strong>`;

  const missedSection = document.getElementById('missedSection');
  const missedGroupsEl = document.getElementById('missedGroups');
  missedGroupsEl.innerHTML = '';

  if (missedGroups.length > 0) {
    missedSection.style.display = 'block';
    missedGroups.forEach(g => {
      const div = document.createElement('div');
      div.className = 'missed-group';
      div.innerHTML = `<div class="missed-group-label">第${g.groupIndex}组（未找到 ${g.words.length} 个）</div>
        <div class="missed-words">${g.words.map(w => `<span class="missed-word">${w}</span>`).join('')}</div>`;
      missedGroupsEl.appendChild(div);
    });
  } else {
    missedSection.style.display = 'none';
  }

  document.getElementById('hint').style.display = 'none';
  document.getElementById('wordGrid').style.display = 'none';
  document.getElementById('chainBox').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('result').classList.add('show');
}

function restart() {
  document.getElementById('wordGrid').style.display = '';
  document.getElementById('chainBox').style.display = '';
  document.getElementById('actions').style.display = '';
  document.getElementById('feedback').style.display = '';
  start();
}

// 修正 showResult 中的逻辑
const originalFinishGroup = finishGroup;
finishGroup = function() {
  if (anchorIdx === null) return;
  const grp = activeGroups[anchorIdx];
  grp.forEach(w => usedWords.add(w));
  anchorIdx = null;
  currentChain = [];
  document.getElementById('chainBox').classList.remove('show');
  document.getElementById('actions').classList.remove('show');
  hideFeedback();
  renderGrid();

  const remaining = allWords.filter(w => !usedWords.has(w));
  if (remaining.length === 0) {
    showResult();
  } else {
    document.getElementById('hint').textContent = '选择下一个单词开始';
  }
};

start();
</script>
</body>
